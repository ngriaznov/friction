name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check

  clippy:
    name: cargo clippy -- -D warnings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  holdout:
    name: holdout lock check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-holdout.sh
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # scripts/check-holdout.sh only checks lock-file hashes against
      # on-disk file bytes; it never opens corpus/manifest.jsonl, so a PR
      # that edits a doc's `split` field directly (without touching file
      # bytes) would pass it undetected. `corpus-tool holdout-check` is the
      # stricter check: it additionally cross-verifies that every locked
      # id's manifest record still says `split: holdout` with a matching
      # sha256, and that every manifest holdout record is present in the
      # lock.
      - run: cargo run -p corpus-tool -- holdout-check
