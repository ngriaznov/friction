# Golden sentence-segmentation fixtures for `SrxSegmenter`.
#
# Each `[[case]]` is one input text plus the exact sequence of sentence
# strings it must segment into. `tests/segment_golden.rs` slices `input`
# with every byte range `SrxSegmenter::segment` returns and asserts the
# result equals `expect`, word for word and byte for byte — so this file
# doubles as the byte-span-exactness check the segmenter must satisfy.
#
# Categories covered (see the `name` prefix of each case): decimals
# (`dec_`), title abbreviations (`abbr_`), initials and letter-abbreviated
# acronyms (`init_`, `acro_`), ellipses (`ellipsis_`), quotes/parens ending
# a sentence (`quote_`, `paren_`, `nested_`), code-ish tokens (`code_`),
# URLs (`url_`), literal markdown emphasis/markup left in prose (`md_`),
# newlines within a paragraph (`nl_`), multi-sentence paragraphs
# (`para_`), punctuation combinations (`punct_`), numbers/measurements
# (`num_`), negative controls that must never split (`neg_ctrl_`), and
# abbreviation/word collisions (`collision_`) — cases where a token on
# the abbreviation no-break list ("no", "ed", "co", "fig", "al", ...) is
# also an ordinary standalone English word or name, so the segmenter must
# still split there when a capitalized word follows.

[[case]]
name = "dec_pi"
input = "The value of pi is 3.14. Everyone knows that."
expect = ["The value of pi is 3.14.", "Everyone knows that."]

