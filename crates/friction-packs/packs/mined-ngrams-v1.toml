# mined-ngrams-v1 pack: hand-curated discriminative 1-/2-/3-gram phrases,
# mined from the TRAIN split only via `corpus-tool mine` and then
# hand-selected from its output — this file is NOT machine-generated and
# should be edited by hand (re-running `mine` does not overwrite it).
#
# Provenance: `corpus-tool mine --n all --top 120 --min-count 5 --report
# <path>`, train split, pooled across all five genres (264 human docs /
# 230 llm docs). Scoring is the log-odds ratio with an informative
# Dirichlet prior (Monroe, Colaresi & Quinn 2008, eq. 16; prior drawn from
# the two classes' own combined counts) — see
# `crates/corpus-tool/src/commands/mine.rs`'s module doc comment for the
# exact formula. `z` below is that run's z-score, copied verbatim from the
# report at curation time (re-running `mine` on a changed corpus will
# shift these numbers; this pack is a point-in-time hand-picked snapshot,
# not something to regenerate blindly).
#
# Curation rationale (why these ~40-per-side entries and not the raw
# top-120): the mined report's raw top ranks are dominated by three kinds
# of entries that were deliberately dropped here:
#
#   1. Topic artifacts of this corpus's specific prompt set and specific
#      human sources, not general llm-vs-human register — e.g.
#      `perceptual`, `chirpline`, `wharfgate`, `route flapping`, `bed
#      adhesion` (each traces to one or two generation prompts about a
#      specific gadget/story), and on the human side named software
#      projects/technologies (`rust`, `flux`, `helm`, `gradle`, `haskell`,
#      `react`, `bazel`, `prometheus`, `linkerd`, `cncf`) that are simply
#      what a chunk of the human corpus's source documents happen to be
#      about. None of these would generalize to a document about a
#      different subject.
#   2. Tokenization/encoding artifacts, not real words — single-letter
#      fragments (`s`, `t`, `v`, `d`, `u`, `m`, `f`) from apostrophe edge
#      cases, and un-decoded HTML entities (`quot`, `gt`, `lt`) that leak
#      through from a handful of human source documents.
#   3. Bare grammatical function words (`the`, `of`, `in`, `is`, `at`,
#      `they`, `you`, `if`, `all`, ...) whose z-score mostly reflects raw
#      frequency rather than a checkable pragmatic marker — the kind of
#      signal `sentence_length_*`/other syntactic metrics already cover,
#      not a phrase a future fix-rule could act on.
#
# What's kept is every entry from the mined top ranks (across all three
# n-gram orders together, not per-order) that reads as an actual register
# marker: second-person/first-person-plural address (`your`, `our`),
# hedges, connectives, intensifiers, and fixed formulas (`feel free to`,
# `don't hesitate to`, `best regards`, "I hope this email finds..."). A
# few entries are counter-intuitive relative to this project's existing
# `friction-metrics` marker lists (e.g. `in fact`, `also`, `in addition
# to`, `for more information`, and `would like to` all land
# human-favored here, not llm-favored) — kept anyway, deliberately, since
# the whole point of this mining pass is to let the data override
# assumptions; a bare word like `in fact` mined mid-sentence is not the
# same signal as `friction-metrics::lexical`'s sentence-*initial*
# `"In fact"` check, so this is not a direct contradiction of that list,
# but it is a genuine surprise worth a human reader's attention before
# either list is trusted uncritically.
#
# Category is a single word naming the entry's pragmatic function:
#   hedge       - softens a claim (`ensure`, `may be`, `it is possible`)
#   connective  - links clauses/ideas (`so`, `because`, `in order to`)
#   intensifier - amplifies a claim (`crucial`, `robust`, `a lot`)
#   formula     - a fixed, near-boilerplate phrase (`best regards`,
#                 `feel free to`)
#   register    - a formality/address marker not fitting the above
#                 (`your`, `it is` vs. `it's`, `there are`)
#
# Ordering: each list is sorted by `z` in the direction that strengthens
# its own side — `llm_favored` descending (most positive first),
# `human_favored` ascending (most negative first) — matching
# `corpus-tool mine`'s own top-llm-favored/top-human-favored convention.

[pack]
version = "mined-ngrams-v1"
method = "log-odds-informative-dirichlet-prior"
corpus_split = "train"
train_human_doc_count = 264
train_llm_doc_count = 230
min_count = 5
llm_favored_count = 40
human_favored_count = 40

