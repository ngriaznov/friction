# Generation prompts for genre "email".
#
# Longer-form emails: team announcements, project status updates, community
# newsletters, detailed technical requests, incident summaries. Each prompt
# asks for one self-contained document with a concrete target word count so
# generated output lands in the 300-2000-word corpus band. No style
# instructions are included here; the style_prompted slice is added
# mechanically at generation time, not authored into these prompts.

[[prompts]]
id = "email-001"
text = "Write an email from an engineering manager to the whole team announcing that the company is migrating its internal wiki from Confluence to a self-hosted MkDocs setup. Explain the reasoning (licensing cost, search quality, git-based review), the migration timeline over the next six weeks, what individual contributors need to do with their existing pages, and who to contact with questions. Aim for around 450 words."
topic = "wiki-migration-announcement"

[[prompts]]
id = "email-002"
text = "Write a weekly project status update email for a mobile app redesign project, addressed to stakeholders who are not engineers. Cover what shipped this week (a new onboarding flow), what's blocked (waiting on legal sign-off for a third-party analytics SDK), what's planned for next week, and a short risk section about the App Store review timeline. Target roughly 475 words."
topic = "project-status-update"

[[prompts]]
id = "email-003"
text = "Write a community newsletter email for a local astronomy club, covering last month's star party attendance, a member's report on photographing the Orion Nebula with a new CMOS camera, an announcement of a guest lecture on exoplanet detection, and the schedule of viewing nights for the coming month. Around 1050 words."
topic = "astronomy-club-newsletter"

[[prompts]]
id = "email-004"
text = "Write a detailed technical request email from a backend developer to a database administrator, asking for a new read replica to be provisioned for a reporting workload, specifying expected query patterns, approximate data volume (around 800GB), desired region, and a proposed cutover date. Include a short explanation of why the primary database is under load. About 325 words."
topic = "database-replica-request"

[[prompts]]
id = "email-005"
