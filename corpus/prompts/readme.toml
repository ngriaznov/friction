# Generation prompts for genre "readme".
#
# Each entry asks a local small model to produce ONE self-contained
# project README for an invented but concrete CLI tool, library, or
# service, matching the pre-2022 open-source README register used for
# the human corpus. No style instructions are included
# here by design: the default-register capture and the
# "sound human" style_prompted slice are handled by the generation
# script, not by prompt wording.

[[prompts]]
id = "readme-001"
text = "Write a README for an open-source command-line tool called phodedupe, written in Python, that scans one or more directories for duplicate photos using perceptual hashing so that resized or slightly re-compressed copies of the same image are still caught. Cover why perceptual hashing beats a plain checksum comparison, how to install it via pip, basic usage for scanning a folder and reviewing a report of duplicate groups before deleting anything, a dry-run flag, and configuration options such as hash algorithm choice and similarity threshold. Aim for about 450 words."
topic = "photo-deduplication"

[[prompts]]
id = "readme-002"
text = "Write a README for confkeep, a small Python library that parses INI-style configuration files while preserving comments and blank lines so round-tripping a file after a programmatic edit doesn't destroy the user's formatting. Explain the motivation compared to the standard library's configparser, show installation via pip, a short code example reading a config, modifying one value, and writing it back out, and describe supported syntax quirks (inline comments, multi-line values, section inheritance). Aim for about 600 words."
topic = "ini-config-parser"

[[prompts]]
id = "readme-003"
text = "Write a README for lumen, a static site generator specifically built for photography portfolios, distributed as a Ruby gem. Describe the folder convention it expects (an images directory per gallery, a front-matter-free markdown file per page), the build command, a local preview server, thumbnail generation and EXIF-based caption extraction, and how to configure the site title, theme, and output directory in a single YAML file. Aim for about 750 words."
topic = "portfolio-site-generator"

[[prompts]]
id = "readme-004"
text = "Write a README for tasq, a command-line todo manager that stores tasks as plain lines of text in a file so the data stays readable and diffable in version control. Cover adding, completing, and listing tasks, tag syntax using an @ prefix, due-date syntax, filtering the list by tag or due date, and where the task file lives by default plus how to point it elsewhere with an environment variable. Aim for about 380 words."
topic = "plaintext-todo-manager"

[[prompts]]
id = "readme-005"
text = "Write a README for csvtype, a Rust crate that reads CSV files and infers a column type schema (integer, float, date, boolean, string) by sampling rows, then exposes a typed record iterator instead of raw strings. Include a Cargo.toml install snippet, a short example inferring a schema and iterating typed rows, notes on how the sampling size affects accuracy, and how to override an inferred type manually per column. Aim for about 550 words."
topic = "csv-type-inference"

[[prompts]]
id = "readme-006"
text = "Write a README for feedwell, a self-hosted RSS and Atom feed reader with a lightweight web UI, packaged to run behind any WSGI server. Cover the feature list (folder organization, read/unread tracking, full-text search across cached articles, OPML import/export), installation from source with a virtualenv, first-run setup creating an admin account, the database backend options (SQLite by default, PostgreSQL supported), and how to schedule feed polling with cron. Aim for about 900 words."
topic = "rss-reader-selfhosted"

[[prompts]]
id = "readme-007"
text = "Write a README for backupctl, a collection of bash scripts that automate nightly backups of a LAMP stack server: MySQL dumps, an rsync of the web root, and rotation of old archives. Describe the required environment variables for database credentials, the cron entry to install, where backups are written and how retention is configured, and a restore script that reverses the process. Aim for about 420 words."
topic = "lamp-backup-automation"

[[prompts]]
id = "readme-008"
text = "Write a README for invoicer4j, a Java library for generating PDF invoices from a template plus a data object, built on top of an existing PDF layout engine. Cover the Maven dependency coordinates, a minimal code sample constructing an invoice with line items and rendering it to a file, how templates are defined (a simple XML layout format), supported currencies and locale-aware number formatting, and known limitations around multi-page invoices. Aim for about 650 words."
