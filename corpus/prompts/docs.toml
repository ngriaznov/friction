# Generation prompts for genre "docs".
#
# Each prompt elicits ONE self-contained technical documentation page in the
# register of pre-2022 permissively-licensed GitHub project docs: how-to
# guides, tutorials, and reference/concept pages for invented (fictional but
# plausible) software, tools, hardware, and systems. No style instructions
# are included — the default model register is what we want to
# capture; the style_prompted slice is added mechanically elsewhere.
#
# Target output length is stated per prompt (300-1200 words) so generated
# docs land in the corpus-wide 300-2000-word band.

[[prompts]]
