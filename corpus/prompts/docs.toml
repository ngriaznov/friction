text = "Write a getting-started guide for a command-line tool called `dedupe-shots` that finds and removes duplicate photos across a local photo library using perceptual hashing. Cover installation, a basic scan command, and how to preview matches before deleting anything. Target about 500 words."
topic = "photo-dedup-cli"

