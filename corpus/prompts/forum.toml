# Generation prompts for genre "forum".
#
# Register: StackExchange-style technical answers and classic phpBB/Discourse
# forum culture (how-tos, troubleshooting threads, experience reports),
# pre-2022 topical mix. Each prompt elicits ONE self-contained document from
# a small local instruct model. No style instructions are included here by
# design — the default-register capture and the separate
# style_prompted slice are handled by the generation script, not the prompt
# text itself.

[[prompts]]
id = "forum-001"
text = "Write a StackExchange-style answer to a question asking how to design a command-line tool in Python that deduplicates a large photo library using perceptual hashing. Cover why a perceptual hash (like pHash or dHash) is preferred over a byte-level checksum, how to bucket near-duplicate hashes with a Hamming-distance threshold, and how to handle burst-mode shots that are visually near-identical but not true duplicates. Aim for roughly 550 words."
topic = "photo-dedup-cli"

