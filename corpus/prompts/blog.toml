# Generation prompts for genre "blog".
#
# These prompts elicit personal/professional tech-blog-style posts in the
# register common on individual and small-team blogs circa 2010-2021:
# mostly technical (programming, infrastructure, tooling, career-in-tech)
# with a minority of general-interest essays, matching the topical spread
# of the human blog corpus for this genre. Deliberately free of any
# style-conditioning instructions (default register only); the
# style_prompted slice is layered on mechanically at generation time.

[[prompts]]
id = "blog-001"
text = "Write a single blog post, about 700 words, about migrating a Rails application's background job queue from Redis-backed Sidekiq to Amazon SQS. Cover why the team decided to switch, what broke during the migration, and what the on-call load looked like the first week after the cutover."
topic = "job-queue-migration"

[[prompts]]
id = "blog-002"
text = "Write a single blog post, about 400 words, walking through a custom Git pre-commit hook the author wrote to catch hardcoded API keys and AWS secrets before they get committed. Include the motivating incident that led to writing it."
topic = "git-pre-commit-hook"

[[prompts]]
id = "blog-003"
text = "Write a single blog post, about 650 words, explaining why a five-person engineering team switched their code review tool from Gerrit to GitHub pull requests, including what they missed about Gerrit and what got easier."
